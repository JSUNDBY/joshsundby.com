<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Josh Sundby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* background image cycle */
    .bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .bg-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bg-img.active { opacity: 0.3; }

    /* grain */
    .grain {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.04;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* content */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 24px;
    }

    .name {
      font-size: clamp(2.4rem, 7vw, 6rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      line-height: 1.1;
      margin-bottom: 0.6em;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.3);
      margin: 0 auto 2em;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    }

    .status {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
    }

    /* corner marks */
    .mark {
      position: absolute;
      z-index: 2;
      width: 32px;
      height: 32px;
      opacity: 0;
      animation: fadeIn 1.6s ease 1.4s forwards;
    }

    .mark--tl { top: 32px; left: 32px; border-top: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.15); }
    .mark--tr { top: 32px; right: 32px; border-top: 1px solid rgba(255,255,255,0.15); border-right: 1px solid rgba(255,255,255,0.15); }
    .mark--bl { bottom: 32px; left: 32px; border-bottom: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.15); }
    .mark--br { bottom: 32px; right: 32px; border-bottom: 1px solid rgba(255,255,255,0.15); border-right: 1px solid rgba(255,255,255,0.15); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="page">

    <div class="bg">
      <div class="bg-img active" style="background-image: url('images/03.png')"></div>
      <div class="bg-img" style="background-image: url('images/01.png')"></div>
      <div class="bg-img" style="background-image: url('images/07.png')"></div>
      <div class="bg-img" style="background-image: url('images/10.png')"></div>
      <div class="bg-img" style="background-image: url('images/05.png')"></div>
    </div>

    <div class="grain"></div>

    <div class="mark mark--tl"></div>
    <div class="mark mark--tr"></div>
    <div class="mark mark--bl"></div>
    <div class="mark mark--br"></div>

    <div class="content">
      <h1 class="name">Josh<br>Sundby</h1>
      <div class="divider"></div>
      <p class="status">Coming Soon</p>
    </div>

  </div>

  <script>
    const imgs = document.querySelectorAll('.bg-img');
    let current = 0;
    setInterval(() => {
      imgs[current].classList.remove('active');
      current = (current + 1) % imgs.length;
      imgs[current].classList.add('active');
    }, 5000);
  </script>

</body>
</html>
